spring:
  application:
    name: order

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health

billing:
  host: ${BILLING_HOST:localhost}
  port: ${BILLING_PORT:8082}

delivery:
  host: ${DELIVERY_HOST:localhost}
  port: ${DELIVERY_POST:8083}

warehouse:
  host: ${WAREHOUSE_HOST:localhost}
  port: ${WAREHOUSE_PORT:8081}