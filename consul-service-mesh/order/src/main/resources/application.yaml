spring:
  application:
    name: order

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

billing:
  url: ${BILLING_URL:http://localhost:8082}

delivery:
  url: ${DELIVERY_URL:http://localhost:8083}

warehouse:
  url: ${WAREHOUSE_URL:http://localhost:8081}