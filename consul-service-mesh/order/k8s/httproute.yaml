apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: order-rate-limit
  labels:
    app: order
plugin: rate-limiting
config:
  minute: 30
  policy: local
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: order
  labels:
    app: order
  annotations:
    konghq.com/plugins: order-rate-limit
spec:
  parentRefs:
    - name: kong-gateway
      namespace: kong
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/order
      backendRefs:
        - name: order
          port: 80