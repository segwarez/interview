apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-v2
  labels:
    app: delivery
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delivery
      version: v2
  template:
    metadata:
      labels:
        app: delivery
        version: v2
      annotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/service-meta-version: "v2"
    spec:
      serviceAccountName: delivery
      containers:
        - name: delivery
          image: delivery
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector-opentelemetry-collector.observability:4317"
            - name: VERSION
              value: v2
          resources:
            requests:
              memory: 1Gi
            limits:
              memory: 1Gi