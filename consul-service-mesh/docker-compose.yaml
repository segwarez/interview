services:
  jaeger:
    image: jaegertracing/jaeger:2.18.0
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.152.1
    command:
      - '--config=/etc/otelcol/config.yaml'
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:v3.11.3
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
      - '--enable-feature=exemplar-storage'
    volumes:
      - ./prometheus-config.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:13.0.1
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    ports:
      - '3000:3000'
    depends_on:
      - prometheus
      - jaeger

  order:
    build: ./order
    restart: on-failure:5
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      BILLING_URL: http://host.docker.internal:8082
      DELIVERY_URL: http://host.docker.internal:8083
      WAREHOUSE_URL: http://host.docker.internal:8081
    ports:
      - '8080:8080'

  warehouse:
    build: ./warehouse
    restart: on-failure:5
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - '8081:8081'

  billing:
    build: ./billing
    restart: on-failure:5
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      WAREHOUSE_URL: http://host.docker.internal:8081
    ports:
      - '8082:8082'

  delivery:
    build: ./delivery
    restart: on-failure:5
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - '8083:8083'