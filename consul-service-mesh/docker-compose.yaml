services:
  loki:
    image: grafana/loki:3.6.7

  tempo:
    image: grafana/tempo:2.10.1
    command:
      - '-config.file=/etc/tempo.yaml'
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml:ro
    ports:
      - '3200:3200'

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    command:
      - '--config=/etc/otelcol/config.yaml'
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - loki
      - tempo

  prometheus:
    image: prom/prometheus:v3.10.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
      - '--enable-feature=exemplar-storage'
    volumes:
      - ./prometheus-config.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'
    depends_on:
      - otel-collector

  pyroscope:
    image: grafana/pyroscope:1.19.0
    environment:
      JAEGER_AGENT_HOST: tempo
      JAEGER_SAMPLER_TYPE: const
      JAEGER_SAMPLER_PARAM: 1
    command:
      - '-config.file=/etc/pyroscope.yml'
    ports:
      - '4040:4040'
    volumes:
      - ./pyroscope-config.yaml:/etc/pyroscope.yml

  grafana:
    image: grafana/grafana:12.4.0
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    ports:
      - '3000:3000'
    depends_on:
      - loki
      - tempo
      - prometheus
      - pyroscope

  order:
    build: ./order
    restart: on-failure:5
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
      BILLING_HOST: host.docker.internal
      DELIVERY_HOST: host.docker.internal
      WAREHOUSE_HOST: host.docker.internal
    ports:
      - '8080:8080'

  warehouse:
    build: ./warehouse
    restart: on-failure:5
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
    ports:
      - '8081:8081'

  billing:
    build: ./billing
    restart: on-failure:5
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
      WAREHOUSE_HOST: host.docker.internal
    ports:
      - '8082:8082'

  delivery:
    build: ./delivery
    restart: on-failure:5
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
    ports:
      - '8083:8083'