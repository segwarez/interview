mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

service:
  type: ClusterIP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

  exporters:
    prometheus:
      endpoint: 0.0.0.0:8889
      enable_open_metrics: true
      resource_to_telemetry_conversion:
        enabled: true

    otlp/jaeger:
      endpoint: jaeger:4317
      tls:
        insecure: true

  processors:
    batch: { }

  service:
    pipelines:
      traces:
        receivers: [ otlp ]
        processors: [ batch ]
        exporters: [ otlp/jaeger ]

      metrics:
        receivers: [ otlp ]
        processors: [ batch ]
        exporters: [ prometheus ]