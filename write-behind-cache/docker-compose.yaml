services:
  postgres:
    image: postgres:18.1
    environment:
      POSTGRES_DB: event
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'

  adminer:
    image: adminer
    ports:
      - '8081:8080'
    depends_on:
      - postgres

  redis:
    image: redis:8.6.2
    ports:
      - "6379:6379"
    volumes:
      - ./init-redis.sh:/init-redis.sh
    command: sh /init-redis.sh